<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="sWx7WEa4GdaN8CatN4Ww7QV9QIsH5VQ4u3Yn4tGIsjk" />
  <meta name="description" content="Cheap flight deals, fare drops & budget travel from all 50 US states. Updated daily.">
  <title>Cheap Flights USA - Flight Deals from Every State</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
 <header class="bg-blue-700 text-white py-8">
  <div class="max-w-6xl mx-auto px-6">
    <div class="flex justify-between items-center">
      <h1 class="text-4xl font-bold">Cheap Flights USA</h1>
      <nav class="space-x-6 text-lg">
        <a href="index.html" class="hover:underline">Home</a>
        <a href="states/california.html" class="hover:underline">California</a>
        <a href="states/florida.html" class="hover:underline">Florida</a>
        <a href="states/texas.html" class="hover:underline">Texas</a>
        <a href="states/illinois.html" class="hover:underline">Illinois</a>
        <a href="states/georgia.html" class="hover:underline">Georgia</a>
        <a href="states/washington.html" class="hover:underline">Washington</a>
        <a href="states/newyork.html" class="hover:underline">New York</a>     
      </nav>
    </div>
    <p class="text-xl mt-3">Real flight deals from all 50 states • Updated automatically</p>
  </div>
</header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <!-- Email Signup -->
<div class="bg-white border-2 border-green-500 rounded-2xl p-8 text-center mb-12 max-w-2xl mx-auto">
  <h2 class="text-3xl font-bold mb-3">Get Daily Cheap Flight Alerts</h2>
  <p class="text-gray-600 mb-6">Free. Never miss a deal from your state.</p>
  
  <!-- Brevo Signup Form -->
  <iframe src="https://6f3772b7.sibforms.com/serve/MUIFAKRJs0biGKwyOb-F01vJvGf7XS-5jAxndV7Ei7lnSMp9ZK3dEsvrq3GF-CyMhCIObsC2QeKPd5_ekT28Xka9GrM_GR9daGpxYooSpI_jIchVPZvNYZcPkcTAxsyy2IOwhne9BnwSyWkt104_vSRzSUNSu_b832fJ19O5K4UqGRPAzaE-1PF_XxMIBmZrsQTawjlYOanLJ3_24A==" 
          style="display:block; width:100%; height:300px; border:none; overflow:auto;" 
          scrolling="no">
  </iframe>
</div>

    <!-- Latest Deals -->
    <h2 class="text-3xl font-bold mb-8">Latest Flight Deals</h2>
    <div id="deals-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <script>
    async function loadDeals() {
      try {
        const response = await fetch('data/deals.json');
        const deals = await response.json();
        
        const container = document.getElementById('deals-list');
        container.innerHTML = deals.map(deal => `
          <div class="bg-white rounded-2xl shadow p-6 hover:shadow-xl transition">
            <div class="text-4xl font-bold text-green-600">$${deal.price}</div>
            <h3 class="font-semibold text-xl mt-3">${deal.title}</h3>
            <p class="text-gray-600 mt-2">${deal.desc}</p>
            <a href="${deal.link}" target="_blank" class="mt-6 block bg-blue-600 text-white text-center py-4 rounded-xl font-medium hover:bg-blue-700">
              Book This Deal →
            </a>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('deals-list').innerHTML = `<p class="text-red-600">Deals will appear here once loaded.</p>`;
      }
    }
    loadDeals();
  </script>
</body>
</html>
