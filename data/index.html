<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cheap flight deals, fare drops & budget travel from all 50 US states. Updated daily.">
  <title>Cheap Flights USA - Flight Deals from Every State</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <header class="bg-blue-700 text-white py-8">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-2">Cheap Flights USA</h1>
      <p class="text-xl">Real flight deals • All 50 states • Updated automatically</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <!-- Email Signup -->
    <div class="bg-white border-2 border-green-500 rounded-2xl p-8 text-center mb-12">
      <h2 class="text-3xl font-bold mb-3">Get Daily Cheap Flight Alerts</h2>
      <p class="text-gray-600 mb-6">Free. No spam. Deals straight to your inbox.</p>
      <input type="email" id="email" placeholder="your@email.com" 
             class="border border-gray-300 px-6 py-4 rounded-xl w-full max-w-md mx-auto text-lg">
      <button onclick="alert('Email signup coming soon! (We will add Brevo later)')" 
              class="mt-6 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-xl font-semibold text-lg">
        Subscribe Free →
      </button>
    </div>

    <!-- Latest Deals -->
    <h2 class="text-3xl font-bold mb-8">Latest Flight Deals</h2>
    <div id="deals-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- JavaScript will fill this -->
    </div>
  </main>

  <script>
    async function loadDeals() {
      try {
        const response = await fetch('data/deals.json');
        const deals = await response.json();
        
        const container = document.getElementById('deals-list');
        container.innerHTML = deals.map(deal => `
          <div class="bg-white rounded-2xl shadow p-6 hover:shadow-xl transition">
            <div class="text-4xl font-bold text-green-600">$${deal.price}</div>
            <h3 class="font-semibold text-xl mt-3">${deal.title}</h3>
            <p class="text-gray-600 mt-2">${deal.desc}</p>
            <a href="${deal.link}" target="_blank" 
               class="mt-6 block bg-blue-600 text-white text-center py-4 rounded-xl font-medium hover:bg-blue-700">
              Book This Deal →
            </a>
          </div>
        `).join('');
      } catch(e) {
        console.log("Could not load deals yet");
      }
    }
    loadDeals();
  </script>
</body>
</html>
